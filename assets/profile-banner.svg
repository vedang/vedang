<svg width="1280" height="320" viewBox="0 0 1280 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Vedang Manerikar profile banner</title>
  <desc id="desc">A dark gradient banner with Vedang Manerikar's name and a short tagline about Clojure, Emacs Lisp, and developer tooling.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A" />
      <stop offset="1" stop-color="#1E293B" />
    </linearGradient>
    <linearGradient id="accent" x1="64" y1="54" x2="552" y2="54" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8B5CF6" />
      <stop offset="1" stop-color="#22D3EE" />
    </linearGradient>
  </defs>

  <rect width="1280" height="320" rx="28" fill="url(#bg)" />
  <circle cx="1120" cy="88" r="110" fill="#22D3EE" fill-opacity="0.07" />
  <circle cx="1210" cy="252" r="150" fill="#8B5CF6" fill-opacity="0.08" />
  <rect x="64" y="54" width="6" height="210" rx="3" fill="url(#accent)" />

  <text x="92" y="80" fill="#93C5FD" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="0.14em">OPEN SOURCE · CLOJURE · EMACS LISP</text>
  <text x="92" y="144" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="52" font-weight="700">Vedang Manerikar</text>
  <text x="92" y="190" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="500">Building tools for reading, thinking, and programming</text>
  <text x="92" y="254" fill="#CBD5E1" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="17">[:unravel :agents :tooling]</text>
  <rect x="92" y="286" width="460" height="2" rx="1" fill="url(#accent)" />
</svg>
